services:
  # Serviço PostgreSQL
  - type: pserv
    name: ecamarao-db
    env: docker
    dockerfilePath: ./docker/Dockerfile.postgres
    envVars:
      - key: POSTGRES_DB
        value: ecamarao_prod
      - key: POSTGRES_USER
        value: eamarao_user
      - key: POSTGRES_PASSWORD
        generateValue: true
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data

  # Serviço Backend
  - type: web
    name: ecamarao-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecamarao-db
          property: connectionString
      - key: PORT
        value: 8000
    healthCheck:
      path: /health
    domains:
      - ecamarao-backend.onrender.com

  # Serviço Frontend
  - type: web
    name: ecamarao-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: ""
    healthCheck:
      path: /
    domains:
      - ecamarao.onrender.com
